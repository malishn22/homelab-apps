services:

  ghms-backend:
    image: ghcr.io/malishn22/minecraft-backend:latest
    container_name: ghms-backend
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      UVICORN_RELOAD: "false"
      UVICORN_HOST: 0.0.0.0
      UVICORN_PORT: ${MINECRAFT_API_PORT:-8000}
      CONTAINER_DATA_ROOT: /data
      HOST_SERVERS_ROOT: ${HOMELAB_ROOT}/apps/minecraft/backend/data/servers
      MINECRAFT_INSTANCES_NETWORK: minecraft_instances
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${HOMELAB_ROOT}/apps/minecraft/backend/data/instances:/data/instances
      - ${HOMELAB_ROOT}/apps/minecraft/backend/data/servers:/data/servers
      - ${HOMELAB_ROOT}/apps/minecraft/backend/data/server-defaults.properties:/data/server-defaults.properties
      - ${HOMELAB_ROOT}/apps/minecraft/backend/data/whitelist-defaults.json:/data/whitelist-defaults.json
      - ${HOMELAB_ROOT}/apps/minecraft/backend/data/ops-defaults.json:/data/ops-defaults.json
      - ${HOMELAB_ROOT}/apps/minecraft/backend/data/backups:/data/backups
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "${MINECRAFT_API_PORT:-8000}:${MINECRAFT_API_PORT:-8000}"
    networks:
      - homelab
      - minecraft_instances

  ghms-frontend:
    image: ghcr.io/malishn22/minecraft-frontend:latest
    container_name: ghms-frontend
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      BACKEND_HOST: ghms-backend
      MINECRAFT_API_PORT: ${MINECRAFT_API_PORT:-8000}
      MINECRAFT_WEB_INTERNAL_PORT: 80
    ports:
      - "3010:80"
    depends_on:
      - ghms-backend
    networks:
      - homelab

networks:
  homelab:
    external: true
    name: homelab
  minecraft_instances:
    name: minecraft_instances
